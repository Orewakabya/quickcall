<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Call</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Baloo Da 2',cursive;
}

body{
background:#fff0f6;
min-height:100vh;
padding:20px;
color:#831843;
display:flex;
flex-direction:column;
}

body.night-mode{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:#fbcfe8;
}

.container{
max-width:1000px;
margin:auto;
flex:1;
}

.logo-area{
text-align:center;
margin-bottom:25px;
}

.logo-area h1{
font-size:36px;
font-weight:800;
background:linear-gradient(145deg,#ec4899,#db2777);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.logo-area span{
display:block;
font-size:14px;
margin-top:5px;
font-weight:600;
color:#db2777;
}

.theme-btn{
background:#2563eb;
color:white;
border:none;
padding:8px 22px;
border-radius:30px;
cursor:pointer;
margin-top:12px;
}

.section{
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
margin-bottom:25px;
}

body.night-mode .section{
background:#1e293b;
}

.section h2{
margin-bottom:20px;
font-size:22px;
color:#db2777;
}

.service-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:18px;
}

.service-card{
border-radius:20px;
padding:20px;
text-align:center;
cursor:pointer;
font-weight:600;
transition:0.2s;
display:flex;
flex-direction:column;
align-items:center;
color:white;
}

.service-card i{
font-size:38px;
margin-bottom:10px;
}

.emergency{background:#dc2626;}
.location{background:#0ea5e9;}
.whatsapp{background:#16a34a;}
.fake{background:#ec4899;}

.service-card:hover{
transform:translateY(-5px);
}

/* Map */
iframe{
border-radius:20px;
border:none;
}

/* Map Buttons */
.map-buttons{
margin-top:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.map-buttons button{
flex:1;
padding:10px;
border:none;
border-radius:20px;
cursor:pointer;
color:white;
font-weight:600;
}

.open-btn{background:#2563eb;}
.nav-btn{background:#16a34a;}

/* Xiaomi-style Fake Call UI (Replaced as requested) */
.fake-call-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:none;
flex-direction:column;
justify-content:space-between;
padding:15px 20px 40px;
z-index:9999;
font-family:sans-serif;
}

/* STATUS BAR */
.status-bar{
display:flex;
justify-content:space-between;
align-items:center;
font-size:13px;
}

.status-left{
font-weight:500;
}

.status-right{
display:flex;
align-items:center;
gap:6px;
}

.status-right i{
font-size:13px;
}

.battery{
width:22px;
height:10px;
border:1.5px solid white;
border-radius:2px;
position:relative;
}

.battery::after{
content:'';
position:absolute;
right:-4px;
top:2px;
width:3px;
height:6px;
background:white;
border-radius:1px;
}

.battery-level{
width:69%;
height:100%;
background:#4ade80;
}

.battery-text{
font-size:11px;
margin-left:2px;
}

/* CALLER TOP AREA */
.caller-top{
text-align:center;
margin-top:40px;
}

.caller-top img{
width:138px;
height:138px;
border-radius:50%;
object-fit:cover;
margin-bottom:04px;
}

.caller-top h2{
font-size:43px;
font-weight:2000;
margin-bottom:3px;
}

.caller-top p{
font-size:22px;
opacity:0.7;
}

/* CALL BUTTONS */
.call-actions{
display:flex;
justify-content:space-around;
margin-bottom:40px;
}

.call-btn{
width:80px;
height:80px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
}

/* Xiaomi style soft pulse */
.accept{
background:#22c55e;
animation:pulseGreen 1.6s infinite;
}

.decline{
background:#ef4444;
animation:pulseRed 1.6s infinite;
}

@keyframes pulseGreen{
0%{box-shadow:0 0 0 0 rgba(34,197,94,0.7);}
70%{box-shadow:0 0 0 25px rgba(34,197,94,0);}
100%{box-shadow:0 0 0 0 rgba(34,197,94,0);}
}

@keyframes pulseRed{
0%{box-shadow:0 0 0 0 rgba(239,68,68,0.7);}
70%{box-shadow:0 0 0 25px rgba(239,68,68,0);}
100%{box-shadow:0 0 0 0 rgba(239,68,68,0);}
}

/* old lock-info (no longer used but keep if any reference) */
.lock-info{display:none;}

@media(max-width:600px){
.logo-area h1{font-size:26px;}
.call-btn{width:70px;height:70px;font-size:26px;}
}
</style>
</head>
<body>

<div class="container">

<div class="logo-area">
<h1>QUICK CALL</h1>
<span>For Women Safety & Emergency Support</span>
<button class="theme-btn" onclick="toggleTheme()">DAY / NIGHT</button>
</div>

<div class="section">
<h2>Emergency Services</h2>

<div class="service-grid">

<div class="service-card emergency" onclick="quickCall('999')">
<i class="fas fa-triangle-exclamation"></i>
Emergency Call
</div>

<div class="service-card location" onclick="getLocation()">
<i class="fas fa-location-dot"></i>
Your Location
</div>

<div class="service-card whatsapp" onclick="shareLocation()">
<i class="fab fa-whatsapp"></i>
Share Location
</div>

<div class="service-card fake" onclick="fakeCall()">
<i class="fas fa-phone"></i>
Fake Call
</div>

</div>
</div>

<div class="section" id="mapSection" style="display:none;">
<h2>Your Live Location</h2>
<iframe id="mapFrame" width="100%" height="300"></iframe>

<div class="map-buttons">
<button class="open-btn" onclick="openInMaps()">Open in Google Maps</button>
<button class="nav-btn" onclick="navigateNow()">Navigate</button>
</div>
</div>

<footer style="text-align:center;margin-top:20px;">© 2026 All Rights Reserved.</footer>

</div>

<!-- Xiaomi Fake Call Screen (Replaced UI & uses statusTime) -->
<div class="fake-call-screen" id="fakeCallScreen">

<!-- Status bar with time element id="statusTime" -->
<div class="status-bar">
<div class="status-left"></div>
<div class="status-right">
<i class="fas fa-wifi"></i>
<i class="fas fa-signal"></i>
<div class="battery">
<div class="battery-level"></div>
</div>
<span class="battery-text" id="statusTime">00:00</span>
</div>
</div>

<div class="caller-top">
<!-- Keep same avatar as before, but using placeholder icon as original -->
<img src="https://images4.imagebam.com/5a/79/5d/ME1B1YG6_o.png" alt="Caller Avatar">
<h2>Maa</h2>
<p>Incoming Call</p>
</div>

<div class="call-actions">
<div class="call-btn decline" onclick="closeFakeCall()">
<i class="fas fa-phone-slash"></i>
</div>
<div class="call-btn accept" onclick="closeFakeCall()">
<i class="fas fa-phone"></i>
</div>
</div>

</div>

<script>
let currentLat,currentLon;

/* ======= Ringtone Link ======= */
let ringtoneURL = "https://files.catbox.moe/tx8v8n.mp3";
/* ============================= */

function toggleTheme(){
document.body.classList.toggle("night-mode");
}

function quickCall(number){
window.location.href="tel:"+number;
}

function getLocation(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(function(pos){
currentLat=pos.coords.latitude;
currentLon=pos.coords.longitude;

let mapURL="https://www.google.com/maps?q="+currentLat+","+currentLon+"&output=embed&z=17";
document.getElementById("mapFrame").src=mapURL;
document.getElementById("mapSection").style.display="block";
document.getElementById("mapSection").scrollIntoView({behavior:"smooth"});
});
}
}

function openInMaps(){
window.open("https://www.google.com/maps?q="+currentLat+","+currentLon);
}

function navigateNow(){
window.open("https://www.google.com/maps/dir/?api=1&destination="+currentLat+","+currentLon);
}

function shareLocation(){
if(currentLat && currentLon){
let msg="I need help! My location: https://www.google.com/maps?q="+currentLat+","+currentLon;
window.open("https://wa.me/?text="+encodeURIComponent(msg));
}
}

/* Fake Call */
let fakeCallInterval;
function fakeCall(){
document.getElementById("fakeCallScreen").style.display="flex";

// ringtone
const ringtone = new Audio(ringtoneURL);
ringtone.loop = true;
ringtone.play().catch(e=>console.log("autoplay prevented? user gesture needed"));
window.currentRingtone = ringtone;

// Start updating the status bar time using the REPLACED function
updateTime();
fakeCallInterval = setInterval(updateTime,1000);
}

/* REPLACED updateTime function: exactly as requested */
function updateTime(){
let now = new Date();
let hours = now.getHours().toString().padStart(2,'0');
let minutes = now.getMinutes().toString().padStart(2,'0');
document.getElementById("statusTime").innerText = hours + ":" + minutes;
}

function closeFakeCall(){
document.getElementById("fakeCallScreen").style.display="none";
if(window.currentRingtone){
window.currentRingtone.pause();
window.currentRingtone.currentTime = 0;
}
clearInterval(fakeCallInterval);
}
</script>

</body>
</html>
